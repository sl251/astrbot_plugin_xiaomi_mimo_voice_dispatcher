name: astrbot_plugin_xiaomi_mimo_voice_dispatcher
author: sl251
version: 0.3.1
astrbot_version: ">=4.9.2"
description: "为 AstrBot 提供 Xiaomi MiMo TTS 语音合成能力的函数工具插件"
desc: "为 AstrBot 提供 Xiaomi MiMo TTS 语音合成能力的函数工具插件"
entry: main.py
homepage: https://github.com/sl251/astrbot_plugin_xiaomi_mimo_voice_dispatcher
repo: https://github.com/sl251/astrbot_plugin_xiaomi_mimo_voice_dispatcher
license: MIT
tags:
  - astrbot
  - tts
  - mimo
  - xiaomi
  - voice-clone

configs:
  api_key:
    type: str
    default: ""
    description: "MiMo API Key"
  api_base:
    type: str
    default: "https://token-plan-cn.xiaomimimo.com/v1"
    description: "MiMo API 接口地址"
  request_timeout_seconds:
    type: int
    default: 60
    description: "MiMo API 读取超时时间（秒），建议 30-90"
  admin_ids:
    type: str
    default: ""
    description: "允许使用管理命令的用户 ID，多个 ID 用英文逗号分隔"
  builtin_model:
    type: str
    default: "mimo-v2.5-tts"
    description: "普通 TTS 模型 ID"
  voice_design_model:
    type: str
    default: "mimo-v2.5-tts-voicedesign"
    description: "音色设计模型 ID"
  voice_clone_model:
    type: str
    default: "mimo-v2.5-tts-voiceclone"
    description: "声音克隆模型 ID"
  builtin_voice:
    type: str
    default: "mimo_default"
    description: "builtin 模式默认内置音色"
    options:
      - "mimo_default"
      - "冰糖"
      - "茉莉"
      - "苏打"
      - "白桦"
      - "Mia"
      - "Chloe"
      - "Milo"
      - "Dean"
  prefer_clone_when_sample_configured:
    type: bool
    default: true
    description: "填写克隆样本路径后，普通语音调用默认使用 voice_clone；明确指定内置音色时仍使用内置音色"
  voice_clone_sample_path:
    type: str
    default: ""
    description: "voice_clone 模式默认本地克隆样本路径，可填写单个音频文件或文件夹"
